---
layout: default
---
<article class="report container narrow">
  <header class="report-header">
    <p class="eyebrow">Report</p>
    <h1>{{ page.title }}</h1>
    {% if page.date %}<p class="report-meta">{{ page.date | date: "%B %Y" }}{% if page.authors %} · {{ page.authors | join: ", " }}{% endif %}</p>{% endif %}
    {% if page.pdf %}<p><a class="btn" href="{{ page.pdf | relative_url }}">Download PDF</a></p>{% endif %}
  </header>
  <div class="report-body">
    {{ content }}
  </div>
</article>
